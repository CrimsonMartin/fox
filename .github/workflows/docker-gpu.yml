name: Docker (GPU)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc*'

env:
  IMAGE: crimsonmartin/fox

jobs:
  build:
    name: Build ${{ matrix.variant }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: cuda
            dockerfile: Dockerfile.cuda
            tag-suffix: "-cuda"
          - variant: rocm
            dockerfile: Dockerfile.rocm
            tag-suffix: "-rocm"

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' google-chrome-stable || true
          sudo apt-get autoremove -y
          df -h /

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          flavor: latest=false
          tags: |
            type=semver,pattern={{version}},suffix=${{ matrix.tag-suffix }}
            type=semver,pattern={{major}}.{{minor}},suffix=${{ matrix.tag-suffix }}
            type=raw,value=latest,suffix=${{ matrix.tag-suffix }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
